services:
  - type: web
    name: learnai-app
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false # Set this in Render Dashboard
      - key: DB_USER
        sync: false # Set this in Render Dashboard
      - key: DB_PASSWORD
        sync: false # Set this in Render Dashboard
      - key: DB_NAME
        sync: false # Set this in Render Dashboard
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false # Set this in Render Dashboard
      - key: EMAIL_USER
        sync: false # Optional: for email service
      - key: EMAIL_PASS
        sync: false # Optional: for email service
